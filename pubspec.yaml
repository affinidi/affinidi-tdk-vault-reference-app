      url: https://github.com/affinidi/affinidi-tdk-dart/
      path: packages/vault_flutter_utils
      ref: 7adf4f63551a4e8e681492b3cdb9c21a9a2fba75
  clock: 1.1.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/
    - lib/application/services/vaults_manager/vaults_manager_service.dart
